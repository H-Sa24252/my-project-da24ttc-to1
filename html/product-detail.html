<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!--liên kết detail.js và products.js-->
    <script src="../js/products.js"></script>
    <script src="../js/detail.js"></script>
    <style>
        body{
            background-color: #f5f5f5;
        }

        .product-image{
            width:100%;
            height:500px;
            object-fit:cover;
            border-radius:10px;
        }

        .description{
            text-align:justify;
            line-height:1.8;
        }

        .quantity-box{
            width:120px;
        }
    </style>
</head>
<body>

    <div class="container py-5">

        <div class="card shadow p-4">

            <div class="row g-5">

                <!-- Hình ảnh -->
                <div class="col-lg-6">
                    <img id="product-image" class="product-image" src="" alt="">
                </div>

                <!-- Thông tin -->
                <div class="col-lg-6 d-flex flex-column">

                    <h2 id="product-name" class="fw-bold mb-3"></h2>

                    <h3 id="product-price" class="text-danger mb-4"></h3>

                    <p id="product-description" class="description text-secondary"></p>

                    <!-- Link sản phẩm -->

</html>
