<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body{
            background-color: #f5f5f5;
        }

        .product-image{
            width:100%;
            max-height:500px;
            object-fit:cover;
            border-radius:10px;
        }

        .description{
            text-align:justify;
            line-height:1.8;
        }

        .detail-card{
            border:none;
            border-radius:16px;
        }
    </style>
</head>
<body>

    <!-- Cart icon (fixed) -->
    <a href="cart.html" class="btn btn-outline-primary position-fixed d-flex align-items-center" style="right:20px; top:20px; z-index:1050;">
        <i class="bi bi-cart-fill" style="font-size:1.25rem"></i>
        <span id="cart-count-badge" class="badge bg-danger text-white rounded-pill ms-1">0</span>
    </a>

    <div class="container py-5">
        <div class="card detail-card shadow p-4">
            <div class="row g-5 align-items-center">
                <div class="col-lg-6">
                    <img id="product-image" class="product-image" src="" alt="Hình ảnh sản phẩm">
                </div>
                <div class="col-lg-6">
                    <h2 id="product-name" class="fw-bold mb-3"></h2>
                    <h3 id="product-price" class="text-danger mb-4"></h3>
                    <p id="product-description" class="description text-secondary"></p>
                    <div class="d-flex gap-2 mb-3">
                        <a id="official-link" class="btn btn-success" href="#" target="_blank">Xem sản phẩm gốc</a>
                        <div class="d-flex align-items-center">
                            <input id="detail-quantity" type="number" min="1" value="1" class="form-control quantity-box me-2" style="width:100px">
                            <button id="add-to-cart-btn" class="btn btn-outline-success">Thêm vào giỏ</button>
                        </div>
                    </div>
                    <div>
                        <a class="btn btn-outline-secondary" href="page7.html">Quay lại trang sản phẩm</a>
                    </div>
                    <div id="product-message" class="alert alert-warning mt-4 d-none" role="alert"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/app.js"></script>
</body>
</html>
