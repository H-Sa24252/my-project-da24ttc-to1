<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Thiết kế form</title>
    <meta charset="utf-8">
 <link rel="stylesheet" href="../css/style2.css">
</head>
<body>
    <div class="container">
        <form id="frmLogin">
            <h3 class="title">Thông tin đăng nhập</h3>
            <div class="formgroup">
                <label for="Username" >Tên đăng nhập:</label>
                <input class="formcontrol" id="Username" name="textUsername" placeholder="Nhập tên đăng nhập">
            </div>
            <div class="formgroup">
                <label for="UserPassword" >Mật khẩu:</label>
                <input class="formcontrol" type="password" id="UserPassword" name="textUserPassword" placeholder="Nhập mật khẩu">
            </div>
            <div class="group_buttons">
                <input class="button" type="submit" value="Đăng nhập">
                <input class="button" type="reset" value="Hủy bỏ">
            </div>
        </form>
    </div>
</body>
</html>
