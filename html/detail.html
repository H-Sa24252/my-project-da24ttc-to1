<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Chi Tiết Sản Phẩm</title>
    <!-- Latest compiled and minified CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .product-img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }
        .container { margin-top: 50px; }
    </style>
</head>
<body>

<div class="container">
    <div class="row align-items-center">
        <!-- Phần bên trái: Hình ảnh -->
        <div class="col-md-6 text-center">
            <img id="product-img" src="https://placeholder.com" alt="Sản phẩm" class="product-img shadow">
        </div>

        <!-- Phần bên phải: Nội dung -->
        <div class="col-md-6">
            <h1 id="product-name" class="display-5 fw-bold">Tên sản phẩm</h1>
            <h3 id="product-price" class="text-danger my-3">000,000đ</h3>
            <p id="product-desc" class="lead text-muted">
                Mô tả chi tiết sản phẩm sẽ hiển thị ở đây. Bạn có thể viết về chất liệu, tính năng hoặc công dụng.
            </p>
            <button class="btn btn-primary btn-lg mt-3">Thêm vào giỏ hàng</button>
        </div>
    </div>
</div>

<!-- JavaScript để quản lý dữ liệu -->
<script>
    // 1. Khai báo đối tượng sản phẩm (Data)
    const product = {
        name: "Tai nghe Bluetooth Sony WH-1000XM5",
        price: "6.490.000đ",
        description: "Chống ồn đỉnh cao, thời lượng pin 30 giờ, âm thanh Hi-Res chất lượng cao. Thiết kế sang trọng, phù hợp cho người hay di chuyển.",
        image: "https://scene7.com"
    };

    // 2. Hàm đổ dữ liệu từ JS ra giao diện HTML
    function renderProduct() {
        document.getElementById('product-name').innerText = product.name;
        document.getElementById('product-price').innerText = product.price;
        document.getElementById('product-desc').innerText = product.description;
        document.getElementById('product-img').src = product.image;
    }

    // Gọi hàm thực thi
    renderProduct();
</script>

</body>
</html>
