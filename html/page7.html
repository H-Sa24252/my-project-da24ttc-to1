<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower Shop</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        body{
            background-color: #f5f5f5;
        }

        .card-img-top{
            height: 250px;
            object-fit: cover;
        }

        .card:hover{
            transform: translateY(-5px);
            transition: 0.3s;
        }

        @media (min-width:1200px){
            .col-xl-custom{
                width:20%;
            }
        }
    </style>
</head>
<body>

    <div class="container-fluid py-4">

        <!-- Cart icon (fixed) -->
        <a href="cart.html" class="btn btn-outline-primary position-fixed d-flex align-items-center" style="right:20px; top:20px; z-index:1050;">
            <i class="bi bi-cart-fill" style="font-size:1.25rem"></i>
            <span id="cart-count-badge" class="badge bg-danger text-white rounded-pill ms-1">0</span>
        </a>

        <h2 class="text-center mb-3 fw-bold text-success">
            DANH SÁCH SẢN PHẨM
        </h2>

        <p class="text-center text-secondary mb-4">
            Danh sách sản phẩm tóm tắt. Bấm "Xem chi tiết" để sang trang chi tiết sản phẩm.
        </p>

        <div class="row g-4 justify-content-center" id="product-list"></div>

    </div>

    <script src="../js/app.js"></script>

</body>
</html>
