<!DOCTYPE html>
<html lang="vi">
    <head>
        <title>HTML DOM</title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="../css/style6.css">
    </head>
    <body>
       <script>
        //Tạo thẻ div
        const newDiv = document.createElement("div");
        //Tạo text node
        const newText = document.createTextNode("Thành công");
        //Tạo thẻ img
        const newImage = document.createElement("img");
        //Thêm thuộc tính cho newImage
        newImage.setAttribute("src","../assets/images/hoa-sen.jpg");
        //Thêm thuộc tính alt và width cho newImage
        newImage.setAttribute("alt","Hoa sen");
        newImage.setAttribute("width","200px");
        //Thêm thuộc tính cho newDiv
        newDiv.setAttribute("class","product-item");
        //Gán newText vào newDiv
        newDiv.appendChild(newText);
        //Gán newImage vào newDiv
        newDiv.appendChild(newImage);
        //Gán vào body
        document.body.appendChild(newDiv);
       </script>
    </body>
</html>
