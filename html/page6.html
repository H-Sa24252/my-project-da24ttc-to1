<!DOCTYPE html>
<html lang="vi">
    <head>
        <title>HTML DOM</title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="../css/style6.css">
    </head>
    <body>
       <script>
        //tạo danh sách sản phẩm
        const products = [
            {
                ten: "Hoa sen",
                gia: "1.500.000đ/bó",
                hinh_anh: "../assets/images/hoa-sen.jpg",
                lien_ket: "https://linhflower.com/thanh-tao-sen/"
            },
            {
                ten: "Hoa hồng",
                gia: "2.000.000đ/bó",
                hinh_anh: "../assets/images/hoa-hong.jpg",
                lien_ket: "https://linhflower.com/bo-hoa-hong-dep-nhat-tang-nguoi-yeu/"
            },
            {
                ten: "Hoa ly",
                gia: "500.000đ/bó",
                hinh_anh: "../assets/images/hoa-ly.jpg",
                lien_ket: "https://linhflower.com/ly-hong-cuoi/"
            }
        ];
        //Duyệt qua danh sách sản phẩm và tạo phần tử HTML cho từng sản phẩm
        products.forEach(product => {
            //Tạo khung chính để chứa sản phẩm
            const productItem = document.createElement("div");
            productItem.setAttribute("class", "product-item");
            //Tạo phần tử hình ảnh
            const productImage = document.createElement("div");
            productImage.setAttribute("class", "product-image");
            //Tạo thẻ img và gán thuộc tính src
            const img = document.createElement("img");
            img.setAttribute("src", product.hinh_anh);
            img.setAttribute("alt", product.ten);
            img.setAttribute("width", "500px");
            img.setAttribute("height", "500px");
            //Gán thẻ img vào phần tử hình ảnh
            productImage.appendChild(img);
            //Tạo phần tử thông tin sản phẩm
            const productInfo = document.createElement("div");  
            productInfo.setAttribute("class", "product-info");
            //Tạo thẻ p để hiển thị tên sản phẩm
            const productName = document.createElement("p");
            productName.setAttribute("class", "product-name");
            productName.innerText = product.ten;
            //Tạo thẻ p để hiển thị giá sản phẩm
            const productPrice = document.createElement("p");
            productPrice.setAttribute("class", "product-price");
            productPrice.innerText = product.gia;
            //Tạo thẻ a để hiển thị liên kết đến trang chi tiết sản phẩm
            const productLink = document.createElement("a");
            productLink.setAttribute("class", "product-link");
            productLink.setAttribute("href", product.lien_ket);
            productLink.innerText = "Xem chi tiết";
            //Gán các phần tử vào phần tử thông tin sản phẩm
            productInfo.appendChild(productName);
            productInfo.appendChild(productPrice);
            productInfo.appendChild(productLink);
            //Gán các phần tử vào khung chính
            productItem.appendChild(productImage);  
            productItem.appendChild(productInfo);
            //Gán khung chính vào body
            document.body.appendChild(productItem);
        });
       </script>
    </body>
</html>
